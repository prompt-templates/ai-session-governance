<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Session Governance</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a28;
    --text:#e8e8ed;--text2:#a0a0b0;--text3:#707085;
    --accent:#6c63ff;--accent2:#ff6b6b;--accent3:#4ecdc4;--accent4:#f7d794;
    --card:#16162a;--border:#2a2a40;
    --font:'Noto Sans TC','Noto Sans JP','SF Pro Display',-apple-system,BlinkMacSystemFont,sans-serif;
  }
  html{scroll-behavior:smooth;font-size:16px}
  body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.7;overflow-x:hidden}
  ::selection{background:var(--accent);color:#fff}
  nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1rem 2rem;
    background:rgba(10,10,15,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;transition:transform .3s}
  nav.hidden{transform:translateY(-100%)}
  .nav-logo{font-size:1.1rem;font-weight:700;color:var(--accent);letter-spacing:.5px}
  .nav-links{display:flex;gap:1.5rem;align-items:center}
  .nav-links a{color:var(--text2);text-decoration:none;font-size:.85rem;transition:color .2s}
  .nav-links a:hover{color:var(--accent)}  .lang-switch{display:flex;gap:4px;background:var(--bg3);border-radius:6px;padding:2px}
  .lang-btn{padding:3px 8px;border:none;background:transparent;color:var(--text3);
    cursor:pointer;font-size:.75rem;border-radius:4px;font-family:var(--font);transition:all .2s}
  .lang-btn.active{background:var(--accent);color:#fff}
  .hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:6rem 2rem 4rem;position:relative;overflow:hidden}
  .hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
    background:radial-gradient(ellipse at 50% 30%,rgba(108,99,255,.12) 0%,transparent 60%);pointer-events:none}
  .hero-badge{display:inline-block;padding:.4rem 1rem;border:1px solid var(--accent);border-radius:100px;
    font-size:.8rem;color:var(--accent);margin-bottom:1.5rem;letter-spacing:1px}
  .hero h1{font-size:clamp(2.2rem,5vw,3.8rem);font-weight:800;line-height:1.2;margin-bottom:1rem;
    background:linear-gradient(135deg,#fff 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .hero p{font-size:clamp(1rem,2vw,1.25rem);color:var(--text2);max-width:680px;margin:0 auto 2rem}
  .hero-cta{display:inline-flex;align-items:center;gap:.5rem;padding:.85rem 2rem;
    background:var(--accent);color:#fff;border-radius:8px;text-decoration:none;font-weight:600;
    transition:transform .2s,box-shadow .2s}
  .hero-cta:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(108,99,255,.35)}
  section{padding:6rem 2rem;max-width:1100px;margin:0 auto}
  .section-label{display:inline-block;font-size:.75rem;font-weight:700;letter-spacing:2px;
    text-transform:uppercase;color:var(--accent);margin-bottom:.75rem}
  .section-title{font-size:clamp(1.6rem,3.5vw,2.4rem);font-weight:800;margin-bottom:1rem;line-height:1.25}
  .section-desc{color:var(--text2);font-size:1.05rem;max-width:700px;margin-bottom:3rem}
  .pain-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem}
  .pain-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem;
    position:relative;overflow:hidden;transition:transform .25s,border-color .25s}
  .pain-card:hover{transform:translateY(-4px);border-color:var(--accent2)}
  .pain-icon{font-size:2rem;margin-bottom:1rem}
  .pain-card h3{font-size:1.15rem;margin-bottom:.5rem}
  .pain-card p{color:var(--text2);font-size:.92rem}  .compare-wrap{display:grid;grid-template-columns:1fr 1fr;gap:2rem;margin-top:2rem}
  @media(max-width:700px){.compare-wrap{grid-template-columns:1fr}}
  .compare-col{border-radius:16px;padding:2rem;position:relative}
  .compare-col.bad{background:linear-gradient(135deg,#1a0a0a,#1a1020);border:1px solid rgba(255,107,107,.25)}
  .compare-col.good{background:linear-gradient(135deg,#0a1a15,#101a20);border:1px solid rgba(78,205,196,.25)}
  .compare-label{font-size:.8rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:1.2rem}
  .compare-col.bad .compare-label{color:var(--accent2)}
  .compare-col.good .compare-label{color:var(--accent3)}
  .chat-bubble{padding:.7rem 1rem;border-radius:12px;margin-bottom:.6rem;font-size:.85rem;max-width:90%;line-height:1.5}
  .chat-bubble.user{background:var(--accent);color:#fff;margin-left:auto;border-bottom-right-radius:4px}
  .chat-bubble.ai{background:var(--bg3);color:var(--text);border-bottom-left-radius:4px}
  .chat-bubble.ai.error{border-left:3px solid var(--accent2)}
  .chat-bubble.ai.ok{border-left:3px solid var(--accent3)}
  .chat-dots{text-align:center;color:var(--text3);font-size:1.5rem;letter-spacing:4px;margin:.5rem 0}
  .workflow-steps{display:flex;flex-direction:column;gap:0;position:relative;margin-top:2rem}
  .workflow-step{display:flex;align-items:flex-start;gap:1.5rem;padding:1.5rem 0;position:relative}
  .step-marker{flex-shrink:0;width:56px;height:56px;border-radius:50%;display:flex;align-items:center;
    justify-content:center;font-size:1.3rem;font-weight:800;border:2px solid var(--border);
    background:var(--bg2);position:relative;z-index:2;transition:border-color .3s,background .3s}
  .workflow-step:hover .step-marker{border-color:var(--accent);background:rgba(108,99,255,.15)}
  .step-line{position:absolute;left:27px;top:56px;bottom:0;width:2px;background:var(--border)}
  .workflow-step:last-child .step-line{display:none}
  .step-content h3{font-size:1.1rem;margin-bottom:.3rem}
  .step-content p{color:var(--text2);font-size:.9rem}
  .feature-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem}
  .feature-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem;
    transition:transform .25s,border-color .25s}
  .feature-card:hover{transform:translateY(-4px);border-color:var(--accent)}
  .feature-card .f-icon{font-size:1.6rem;margin-bottom:.8rem}
  .feature-card h3{font-size:1.05rem;margin-bottom:.4rem}
  .feature-card p{color:var(--text2);font-size:.88rem}  .scenario-tabs{display:flex;gap:.5rem;margin-bottom:2rem;flex-wrap:wrap}
  .scenario-tab{padding:.55rem 1.2rem;border-radius:100px;border:1px solid var(--border);
    background:transparent;color:var(--text2);cursor:pointer;font-size:.85rem;font-family:var(--font);transition:all .2s}
  .scenario-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .scenario-panel{display:none;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem}
  .scenario-panel.active{display:block}
  .scenario-panel h3{font-size:1.15rem;margin-bottom:.5rem}
  .scenario-panel p{color:var(--text2);font-size:.92rem;margin-bottom:.75rem}
  .scenario-highlight{padding:.75rem 1rem;background:rgba(108,99,255,.08);border-left:3px solid var(--accent);
    border-radius:0 8px 8px 0;font-size:.88rem;color:var(--text)}
  .qs-steps{display:flex;flex-direction:column;gap:1.2rem;margin-top:2rem}
  .qs-step{display:flex;gap:1.2rem;align-items:flex-start}
  .qs-num{flex-shrink:0;width:36px;height:36px;border-radius:50%;background:var(--accent);
    color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem}
  .qs-step p{font-size:.95rem;color:var(--text2)}
  .qs-step code{background:var(--bg3);padding:.2rem .5rem;border-radius:4px;font-size:.85rem;color:var(--accent3)}
  .code-block{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:1.2rem 1.5rem;
    font-family:'Fira Code',monospace;font-size:.85rem;color:var(--accent3);margin-top:1rem;
    position:relative;overflow-x:auto;white-space:pre;line-height:1.6}
  .code-block .comment{color:var(--text3)}
  .faq-list{display:flex;flex-direction:column;gap:.75rem}
  .faq-item{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .faq-q{padding:1.2rem 1.5rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;
    font-weight:600;font-size:.95rem;transition:color .2s;user-select:none}
  .faq-q:hover{color:var(--accent)}
  .faq-q::after{content:'+';font-size:1.3rem;color:var(--text3);transition:transform .3s}
  .faq-item.open .faq-q::after{transform:rotate(45deg);color:var(--accent)}
  .faq-a{max-height:0;overflow:hidden;transition:max-height .35s ease,padding .35s ease;padding:0 1.5rem}
  .faq-item.open .faq-a{max-height:400px;padding:0 1.5rem 1.2rem}
  .faq-a p{color:var(--text2);font-size:.9rem}
  footer{text-align:center;padding:4rem 2rem;border-top:1px solid var(--border);color:var(--text3);font-size:.85rem}
  footer a{color:var(--accent);text-decoration:none}
  .reveal{opacity:0;transform:translateY(40px);transition:opacity .7s ease,transform .7s ease}
  .reveal.visible{opacity:1;transform:translateY(0)}
  .reveal-delay-1{transition-delay:.15s}
  .reveal-delay-2{transition-delay:.3s}
  .stat-row{display:flex;justify-content:center;gap:3rem;flex-wrap:wrap;margin:3rem 0}
  .stat-item{text-align:center}
  .stat-num{font-size:clamp(2rem,4vw,3rem);font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums}
  .stat-label{font-size:.85rem;color:var(--text3);margin-top:.2rem}
  .full-bg{background:var(--bg2);max-width:100%;padding:5rem 2rem;margin:0}
  .inner{max-width:1100px;margin:0 auto}
  .cause-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:2rem}
  .cause-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem}
  .cause-card h3{color:var(--accent4);margin-bottom:.5rem}
  .cause-card p{color:var(--text2);font-size:.9rem}
  @media(max-width:600px){nav{padding:.75rem 1rem}.nav-links{gap:.6rem}.stat-row{gap:1.5rem}section{padding:4rem 1.2rem}}
</style>
</head>
<body>
<nav id="nav">
  <div class="nav-logo">AI Session Governance</div>
  <div class="nav-links">
    <a href="#pain" data-i18n="nav_pain"></a>
    <a href="#compare" data-i18n="nav_compare"></a>
    <a href="#how" data-i18n="nav_how"></a>
    <a href="#features" data-i18n="nav_features"></a>
    <a href="#start" data-i18n="nav_start"></a>
    <div class="lang-switch">
      <button class="lang-btn" data-lang="tw">繁</button>
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="cn">简</button>
      <button class="lang-btn" data-lang="ja">JA</button>
    </div>
  </div>
</nav>

<div class="hero">
  <span class="hero-badge">OPEN SOURCE · <span data-i18n="badge_cross"></span></span>

  <p data-i18n="hero_desc"></p>
  <a href="#start" class="hero-cta">⚡ <span data-i18n="hero_cta"></span></a>
  <div class="stat-row">
    <div class="stat-item reveal">
      <div class="stat-num" data-target="249">0</div>
      <div class="stat-label" data-i18n="stat_tests"></div>
    </div>
    <div class="stat-item reveal reveal-delay-1">
      <div class="stat-num" data-target="3">0</div>
      <div class="stat-label" data-i18n="stat_platforms"></div>
    </div>
    <div class="stat-item reveal reveal-delay-2">
      <div class="stat-num" data-target="30">0</div>
      <div class="stat-label" data-i18n="stat_seconds"></div>
    </div>
  </div>
</div>
<section id="pain">
  <div class="reveal">
    <span class="section-label" data-i18n="pain_label"></span>
    <h2 class="section-title" data-i18n="pain_title"></h2>
    <p class="section-desc" data-i18n="pain_desc"></p>
  </div>
  <div class="pain-grid">
    <div class="pain-card reveal"><div class="pain-icon">🧠</div><h3 data-i18n="pain1_t"></h3><p data-i18n="pain1_d"></p></div>
    <div class="pain-card reveal reveal-delay-1"><div class="pain-icon">🔄</div><h3 data-i18n="pain2_t"></h3><p data-i18n="pain2_d"></p></div>
    <div class="pain-card reveal reveal-delay-2"><div class="pain-icon">💸</div><h3 data-i18n="pain3_t"></h3><p data-i18n="pain3_d"></p></div>
    <div class="pain-card reveal"><div class="pain-icon">📄</div><h3 data-i18n="pain4_t"></h3><p data-i18n="pain4_d"></p></div>
    <div class="pain-card reveal reveal-delay-1"><div class="pain-icon">🏗️</div><h3 data-i18n="pain5_t"></h3><p data-i18n="pain5_d"></p></div>
    <div class="pain-card reveal reveal-delay-2"><div class="pain-icon">🎯</div><h3 data-i18n="pain6_t"></h3><p data-i18n="pain6_d"></p></div>
  </div>
</section>

<section class="full-bg" style="max-width:100%">
  <div class="inner">
    <div class="reveal">
      <span class="section-label" data-i18n="cause_label"></span>
      <h2 class="section-title" data-i18n="cause_title"></h2>
      <p class="section-desc" data-i18n="cause_desc"></p>
    </div>
    <div class="cause-grid">
      <div class="cause-card reveal"><h3 data-i18n="cause1_t"></h3><p data-i18n="cause1_d"></p></div>
      <div class="cause-card reveal reveal-delay-1"><h3 data-i18n="cause2_t"></h3><p data-i18n="cause2_d"></p></div>
      <div class="cause-card reveal reveal-delay-2"><h3 data-i18n="cause3_t"></h3><p data-i18n="cause3_d"></p></div>
    </div>
  </div>
</section>
<section id="compare">
  <div class="reveal">
    <span class="section-label" data-i18n="cmp_label"></span>
    <h2 class="section-title" data-i18n="cmp_title"></h2>
    <p class="section-desc" data-i18n="cmp_desc"></p>
  </div>
  <div class="compare-wrap reveal">
    <div class="compare-col bad">
      <div class="compare-label" data-i18n="cmp_bad"></div>
      <div class="chat-bubble user" data-i18n="cmp_b1"></div>
      <div class="chat-bubble ai error" data-i18n="cmp_b2"></div>
      <div class="chat-bubble user" data-i18n="cmp_b3"></div>

      <div class="compare-label" data-i18n="cmp_good"></div>
      <div class="chat-bubble user" data-i18n="cmp_g1"></div>
      <div class="chat-bubble ai ok" data-i18n="cmp_g2"></div>
      <div class="chat-bubble ai ok" data-i18n="cmp_g3"></div>
      <div class="chat-bubble user" data-i18n="cmp_g4"></div>
      <div class="chat-bubble ai ok" data-i18n="cmp_g5"></div>
      <div class="chat-dots">···</div>
      <p style="color:var(--accent3);font-size:.82rem;text-align:center;margin-top:.5rem" data-i18n="cmp_g_sum"></p>
    </div>
  </div>
</section>

      <div class="workflow-step reveal reveal-delay-1"><div class="step-marker">🔧</div><div class="step-line"></div><div class="step-content"><h3 data-i18n="wf3_t"></h3><p data-i18n="wf3_d"></p></div></div>
      <div class="workflow-step reveal reveal-delay-2"><div class="step-marker">✅</div><div class="step-line"></div><div class="step-content"><h3 data-i18n="wf4_t"></h3><p data-i18n="wf4_d"></p></div></div>
      <div class="workflow-step reveal reveal-delay-2"><div class="step-marker">💾</div><div class="step-content"><h3 data-i18n="wf5_t"></h3><p data-i18n="wf5_d"></p></div></div>
    </div>

<section id="features">
  <div class="reveal">
    <span class="section-label" data-i18n="feat_label"></span>

</section>

<section class="full-bg" style="max-width:100%">
  <div class="inner">
    <div class="reveal">
      <span class="section-label" data-i18n="sc_label"></span>
      <h2 class="section-title" data-i18n="sc_title"></h2>

    <div class="scenario-panel" id="s2"><h3 data-i18n="sc2_t"></h3><p data-i18n="sc2_d"></p><div class="scenario-highlight" data-i18n="sc2_h"></div></div>
    <div class="scenario-panel" id="s3"><h3 data-i18n="sc3_t"></h3><p data-i18n="sc3_d"></p><div class="scenario-highlight" data-i18n="sc3_h"></div></div>
  </div>

<section id="start">
  <div class="reveal">
    <span class="section-label" data-i18n="qs_label"></span>
    <h2 class="section-title" data-i18n="qs_title"></h2>
    <p class="section-desc" data-i18n="qs_desc"></p>
  </div>

    <div class="qs-step reveal"><div class="qs-num">1</div><div><p data-i18n-html="qs1"></p></div></div>
    <div class="qs-step reveal reveal-delay-1"><div class="qs-num">2</div><div><p data-i18n="qs2"></p><div class="code-block"><span class="comment" data-i18n="qs2_c1"></span>
INSTALL_ROOT_OK: /your/project/path
<span class="comment" data-i18n="qs2_c2"></span>
INSTALL_WRITE_OK</div></div></div>
    <div class="qs-step reveal reveal-delay-2"><div class="qs-num">3</div><div><p data-i18n="qs3"></p><div class="code-block" data-i18n="qs3_cmd"></div><p style="margin-top:.5rem;font-size:.88rem" data-i18n="qs3_note"></p></div></div>
    <div class="qs-step reveal"><div class="qs-num">4</div><div><p data-i18n="qs4"></p><div class="code-block" data-i18n="qs4_cmd"></div><p style="margin-top:.5rem;font-size:.88rem" data-i18n="qs4_note"></p></div></div>
    <div class="qs-step reveal reveal-delay-1"><div class="qs-num">5</div><div><p data-i18n="qs5"></p><div class="code-block"><span class="comment" data-i18n="qs5_c1"></span>
<span class="comment" data-i18n="qs5_c2"></span></div><p style="margin-top:.5rem;font-size:.88rem" data-i18n-html="qs5_note"></p></div></div>

pain4_t:"文档说一套，代码做一套",pain4_d:"README 写的是三个月前的版本，SESSION_LOG 两周没更新。AI 照着过时的文档改，你又要再修一轮。",
pain5_t:"规则越来越多，矛盾越来越大",pain5_d:"每次出问题就加一条规则。半年后规则相互冲突，AI 不知道该听哪一条。",
pain6_t:"API 参数用猜的",pain6_d:"AI「记得」一个 endpoint 长什么样——但那是训练数据里的旧版。代码写了，跑不动，debug 半天。",
cause_label:"根本原因",cause_title:"为什么 AI 会「断片」？",cause_desc:"不是 AI 不聪明——这是目前所有大型语言模型的结构性限制。",
cause1_t:"🪟 Context Window 有上限",cause1_d:"AI 的对话窗口像白板——容量有限，写满就要擦掉。每次新 session 开始，白板是空的。这是技术限制，不是 bug。",
cause2_t:"🚫 没有内置「笔记本」",cause2_d:"AI 不会主动帮你记上次做了什么。如果你不给它看「上班笔记」，它每次都像新来的实习生——聪明但一无所知。",
cause3_t:"🔀 工具之间不通讯",cause3_d:"Claude、Gemini、Codex——各自有自己的 context，彼此不会自动分享。就像三个不同的员工，你得一个一个交代。",
cmp_label:"对比",cmp_title:"同一个任务，两种体验",cmp_desc:"假设你昨天用 Claude 做了一半的功能，今天换 Gemini 继续。",
cmp_bad:"❌ 没有 Session Governance",cmp_good:"✅ 使用 Session Governance",
cmp_b1:"继续昨天的工作",cmp_b2:"我是新的对话，无法知道你昨天做了什么。可以告诉我你的项目使用什么技术栈吗？",
cmp_b3:"（叹气）React + Express + PostgreSQL，已经做好了登录功能，正在做购物车…",cmp_b4:"好的。购物车的数据结构是什么样的？目前的 API 路由有哪些？",
cmp_b5:"（又要重新解释 15 分钟…）",cmp_b_sum:"⏱ 浪费 15-30 分钟重建 context",
cmp_g1:"请按 AGENTS.md 开始本次工作阶段",cmp_g2:"读取 SESSION_HANDOFF.md… SESSION_LOG.md… 完成。",
cmp_g3:"📋 目前状态：React+Express+PostgreSQL，登录完成（已测试），购物车 API 路由 3/5 完成。上次停在 cart/checkout endpoint。",
cmp_g4:"好，继续",cmp_g5:"PLAN：完成 cart/checkout 与 cart/remove endpoint…",
cmp_g_sum:"⚡ 大幅减少重复说明时间（无法保证 100% 零遗漏）",
how_label:"运作原理",how_title:"就像医院的轮班交接",
how_desc:"护士下班时会写交班记录：病人状况、用药、注意事项。下一班护士看完记录就能直接照顾，不用重新问病人。<br><br>AI Session Governance 做的事一模一样——只是对象从「病人」换成了「你的项目」。",
wf1_t:"1. 读交班 — READ",wf1_d:"新 session 开始时，AI 先读 HANDOFF（目前状态）和 LOG（历史记录），不用你口述。",
wf2_t:"2. 拟定计划 — PLAN",wf2_d:"搞清楚要做什么、影响范围多大、哪些地方有风险。",
wf3_t:"3. 最小改动 — CHANGE",wf3_d:"只改需要改的部分，不做无关的重构或修饰。",
wf4_t:"4. 质量确认 — QC",wf4_d:"跑测试、验结果、确认没有破坏现有功能。",
wf5_t:"5. 写交班 — PERSIST",wf5_d:"更新 HANDOFF 和 LOG，下一位接手的 AI（或下一次的你）就能接续。",
feat_label:"内置防护",feat_title:"不只是交接——还帮你挡住常见的坑",feat_desc:"这些是用 AI 开发时最容易踩到的雷。Session Governance 在规则层面就帮你预防了。",
f0_t:"PLAN 风险分级",f0_d:"高风险任务（影响多个文件、范围不明、破坏性操作）会在 AI 动手前暂停，等你确认理解正确。低风险任务照常自动进行。",
f1_t:"外部 API 安全",f1_d:"AI 不准用「记忆」里的 API 参数写代码。必须先查文档、记录在案，查不到就不写——防止你 debug 半天才发现是 endpoint 过期。",
f2_t:"整合优先纪律",f2_d:"遇到问题不是无脑加新规则，而是先检查有没有旧规则可以更新。避免规则膨胀到自相矛盾。",
f3_t:"文档同步注册表",f3_d:"改了代码？注册表告诉 AI 还要同步哪些文档。不猜、不漏，查表就好。",
f4_t:"测试计划治理",f4_d:"每个功能改动都要有「测试矩阵」：正常路径、边界条件、错误路径、回归。不是改完就算交差。",
f5_t:"日志自动归档",f5_d:"工作日志超过 400 行自动搬到 archive，保持 AI 启动时读取的数据精简。不删除，只搬移。",
f6_t:"文件安全治理",f6_d:"AI 不准执行危险操作（如 rm -rf、git reset --hard）。权限不够？列出「手动操作清单」让你自己决定。",
sc_label:"应用场景",sc_title:"谁适合用？",sc_desc:"不管你是一个人开发还是团队协作，只要用 AI 写代码就会遇到这些状况。",

sc1_t:"配额用完，换工具继续",sc1_d:"Claude 用完换 Gemini、Gemini 用完换 Codex——交接文档让下一个工具直接接续，不用从头解释。",sc1_h:"💡 实测：从 Claude 切到 Gemini，通过 SESSION_HANDOFF 可大幅减少重复说明的时间。",
sc2_t:"一个 Repo，多个 AI 分工",sc2_d:"Codex 写代码、Claude 写文档、Gemini 处理基础设施——共用交接记录，各工具对项目状态保持一致。",sc2_h:"💡 共享 SESSION_LOG 让不同工具看到一致的历史记录。",
sc3_t:"半年后规则开始打架",sc3_d:"修复累积、规则膨胀、文档矛盾。「先整合、后新增」的纪律帮你控制复杂度。",sc3_h:"💡 整合纪律要求每次新增规则前先检查有无重叠——从源头防止冲突。",

qs2:"AI 会显示路径与计划，输入以下确认：",

faqs:[{q:"这只适合大型项目吗？",a:"不是。小型项目马上就有效果，大型项目时间拉长效益更明显。"},{q:"第一天就需要 PROJECT_MASTER_SPEC.md 吗？",a:"不用。先用 AGENTS.md + SESSION_HANDOFF.md + SESSION_LOG.md 就够了，日后需要再加。"},{q:"这是编码标准吗？",a:"不是。它规范 AI 怎么读、改、验证、交接——不管你怎么写代码。"},{q:"这会拖慢 AI 吗？",a:"开始时有一小段读取时间，通常比重复交代情况和修正错误省时得多。"},{q:"能跟我现有的 README 和内部规则共存吗？",a:"可以。安装时会跟你现有文件合并，不会覆盖掉你的内容。"}],

let lang="tw";
function setLang(l){
  lang=l;const d=I[l];if(!d)return;
  document.querySelectorAll("[data-i18n]").forEach(el=>{const k=el.getAttribute("data-i18n");if(d[k]!=null)el.textContent=d[k]});
  document.querySelectorAll("[data-i18n-html]").forEach(el=>{const k=el.getAttribute("data-i18n-html");if(d[k]!=null)el.innerHTML=d[k]});
  document.querySelectorAll(".lang-btn").forEach(b=>{b.classList.toggle("active",b.dataset.lang===l)});
  document.documentElement.lang=l==="tw"?"zh-Hant":l==="cn"?"zh-Hans":l==="ja"?"ja":"en";
  renderFaq(d);
}
function renderFaq(d){
  const list=document.getElementById("faqList");if(!list||!d.faqs)return;
  list.innerHTML=d.faqs.map((f,i)=>`<div class="faq-item"><div class="faq-q">${f.q}</div><div class="faq-a"><p>${f.a}</p></div></div>`).join("");
  list.querySelectorAll(".faq-q").forEach(q=>q.addEventListener("click",()=>q.parentElement.classList.toggle("open")));
}
document.querySelectorAll(".lang-btn").forEach(b=>b.addEventListener("click",()=>setLang(b.dataset.lang)));
// Scroll reveal
const revealObs=new IntersectionObserver((entries)=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add("visible");revealObs.unobserve(e.target)}})},{threshold:0.1});
document.querySelectorAll(".reveal").forEach(el=>revealObs.observe(el));
// Counter animation
const ctrObs=new IntersectionObserver((entries)=>{entries.forEach(e=>{if(e.isIntersecting){const el=e.target;const target=+el.dataset.target;let cur=0;const step=Math.max(1,Math.floor(target/40));const timer=setInterval(()=>{cur+=step;if(cur>=target){cur=target;clearInterval(timer)}el.textContent=cur+(target===30?"s":"+")},30);ctrObs.unobserve(el)}})},{threshold:0.3});
document.querySelectorAll(".stat-num[data-target]").forEach(el=>ctrObs.observe(el));
// Scenario tabs
document.querySelectorAll(".scenario-tab").forEach(tab=>tab.addEventListener("click",()=>{
  document.querySelectorAll(".scenario-tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".scenario-panel").forEach(p=>p.classList.remove("active"));
  tab.classList.add("active");
  const p=document.getElementById(tab.dataset.tab);if(p)p.classList.add("active");
}));
// Nav hide on scroll
let lastY=0;const nav=document.getElementById("nav");
window.addEventListener("scroll",()=>{const y=window.scrollY;if(y>lastY&&y>80)nav.classList.add("hidden");else nav.classList.remove("hidden");lastY=y});
// Smooth scroll for nav links
document.querySelectorAll('nav a[href^="#"]').forEach(a=>a.addEventListener("click",e=>{e.preventDefault();const t=document.querySelector(a.getAttribute("href"));if(t)t.scrollIntoView({behavior:"smooth",block:"start"})}));
// Init — respect ?lang= query param from README links
const urlLang=new URLSearchParams(window.location.search).get("lang");
setLang(urlLang&&I[urlLang]?urlLang:"tw");
</script>
